name: Build Windows Installer

on:
  release:
    types: [created]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Get GDAL wheel URL
        id: gdal_wheel
        shell: bash
        run: |
          RELEASE_URL=$(curl -s https://api.github.com/repos/cgohlke/geospatial-wheels/releases/latest \
            | python -c "
import sys, json
assets = json.load(sys.stdin)['assets']
matches = [a['browser_download_url'] for a in assets
           if 'gdal' in a['name'].lower() and 'cp311' in a['name'] and 'win_amd64' in a['name']]
print(matches[0])
")
          echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          pip install customtkinter Pillow pyinstaller
          pip install "${{ steps.gdal_wheel.outputs.url }}"

      - name: Build executable with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "GeoConvert" `
            --icon "geoconvert_logo_final.png" `
            --add-data "geoconvert_logo_final.png;." `
            --add-data "geoconvert_logo_flat_white_1773006660522.png;." `
            --add-data "converter;converter" `
            gui.py

      - name: Upload .exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GeoConvert.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
